<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Compare Forms | Login</title>
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body>
  <div class="wrap narrow">
    <div class="top">
      <div>
        <h1>Compare Forms</h1>
        <div class="muted">Login or create your account</div>
      </div>
    </div>

    <div class="card">
      <div class="tabs">
        <button class="tab active" data-tab="login" type="button">Login</button>
        <button class="tab" data-tab="signup" type="button">Sign Up</button>
      </div>

      <div id="panel-login" class="panel">
        <form id="loginForm">
          <div class="grid2">
            <div>
              <label for="loginEmail">Email</label>
              <input id="loginEmail" type="email" autocomplete="email" required />
            </div>
            <div>
              <label for="loginPass">Password</label>
              <input id="loginPass" type="password" autocomplete="current-password" required />
            </div>
          </div>

          <div class="actions" style="margin-top:12px">
            <button class="btn" id="loginBtn" type="submit">Login</button>
            <button class="btn secondary" id="forgotBtn" type="button">Forgot Password</button>
          </div>

          <div id="loginStatus" class="status hide" role="status" aria-live="polite"></div>
        </form>
      </div>

      <div id="panel-signup" class="panel hide">
        <form id="signupForm">
          <div class="grid2">
            <div>
              <label for="signupFirst">First Name</label>
              <input id="signupFirst" type="text" autocomplete="given-name" required />
            </div>
            <div>
              <label for="signupLast">Last Name</label>
              <input id="signupLast" type="text" autocomplete="family-name" required />
            </div>
          </div>

          <div class="grid2" style="margin-top:10px">
            <div>
              <label for="signupEmail">Email</label>
              <input id="signupEmail" type="email" autocomplete="email" required />
            </div>
            <div>
              <label for="signupPass">Password</label>
              <input id="signupPass" type="password" autocomplete="new-password" minlength="6" required />
            </div>
          </div>

          <div class="actions" style="margin-top:12px">
            <button class="btn" id="signupBtn" type="submit">Create Account</button>
          </div>

          <div class="muted" style="margin-top:8px">
            If email confirmation is enabled in Supabase, confirm the email first, then login.
          </div>

          <div id="signupStatus" class="status hide" role="status" aria-live="polite"></div>
        </form>
      </div>
    </div>
  </div>

  <script type="module" src="/assets/auth.js"></script>
</body>
</html>
