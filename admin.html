<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Compare Forms | Admin</title>
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h1>Admin</h1>
        <div class="muted" id="adminWho">Loading…</div>
      </div>
      <div class="actions">
        <a class="btn secondary" href="/dashboard.html">Back</a>
        <button class="btn secondary" id="logoutBtn" type="button">Logout</button>
      </div>
    </div>

    <div class="card">
      <h2 style="margin-top:0">Users</h2>
      <div class="muted">Admins can change first name, last name, role, and org_id.</div>
      <div style="overflow:auto;margin-top:10px">
        <table>
          <thead>
            <tr>
              <th>Email</th>
              <th>First</th>
              <th>Last</th>
              <th>Role</th>
              <th>Org ID</th>
              <th>Save</th>
            </tr>
          </thead>
          <tbody id="usersBody"></tbody>
        </table>
      </div>
      <div id="adminStatus" class="status hide" role="status" aria-live="polite"></div>
    </div>
  </div>

  <script type="module" src="/assets/admin.js"></script>
</body>
</html>
